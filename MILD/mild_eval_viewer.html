<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>MILD — 매매 타이밍 평가 뷰어</title>
<style>
  :root {
    --bg: #0f0f1a; --card: #1a1a2e; --border: #2a2a4a;
    --blue: #4a9eff; --orange: #ff7043; --green: #26a69a;
    --red: #ef5350; --gold: #ffd54f; --purple: #ab47bc;
    --text: #e0e0e0; --muted: #888;
    --buy: #26a69a; --sell: #ef5350;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text);
         font-family: 'Malgun Gothic','Segoe UI',sans-serif; padding: 28px 24px; }

  h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 32px; }

  .section-label {
    font-size: 0.7rem; font-weight: 700; letter-spacing: .12em;
    text-transform: uppercase; color: var(--muted);
    border-left: 3px solid var(--blue); padding-left: 10px;
    margin: 36px 0 14px;
  }

  /* ── 집계 카드 ── */
  .kpi-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 8px; }
  .kpi { background: var(--card); border: 1px solid var(--border);
         border-radius: 10px; padding: 16px 22px; min-width: 140px; }
  .kpi-label { font-size: 0.72rem; color: var(--muted); margin-bottom: 6px;
               text-transform: uppercase; letter-spacing: .06em; }
  .kpi-value { font-size: 1.8rem; font-weight: 700; line-height: 1; }

  /* ── 태그 ── */
  .tag { display: inline-block; padding: 2px 9px; border-radius: 4px;
         font-size: 0.72rem; font-weight: 700; }
  .tag-buy   { background: rgba(38,166,154,.18); color: var(--buy); }
  .tag-sell  { background: rgba(239,83,80,.18);  color: var(--sell); }
  .tag-early { background: rgba(74,158,255,.15); color: var(--blue); }
  .tag-mid   { background: rgba(255,213,79,.15); color: var(--gold); }
  .tag-late  { background: rgba(239,83,80,.15);  color: var(--red); }
  .tag-rising  { background: rgba(38,166,154,.12); color: var(--green); }
  .tag-falling { background: rgba(239,83,80,.12);  color: var(--red); }

  /* ── 종목 탭 ── */
  .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab { padding: 7px 18px; border-radius: 6px; cursor: pointer;
         border: 1px solid var(--border); background: var(--card);
         font-size: 0.85rem; color: var(--muted); transition: all .15s; }
  .tab.active, .tab:hover { border-color: var(--blue); color: var(--blue);
                             background: rgba(74,158,255,.08); }
  .ticker-panel { display: none; }
  .ticker-panel.active { display: block; }

  hr { border: none; border-top: 1px solid var(--border); margin: 40px 0; }

  /* ── 종목 패널 ── */
  .ticker-section {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px 28px;
  }

  /* ── 종목 한 줄 내러티브 ── */
  .asset-narrative {
    font-size: 0.95rem; line-height: 1.7; color: var(--text);
    margin-bottom: 28px; padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  /* ── 매수/매도 스코어 ── */
  .score-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
  }
  .score-block { }
  .score-label {
    font-size: 0.7rem; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
  }
  .score-dots {
    display: flex; gap: 6px; align-items: center; margin-bottom: 10px;
  }
  .dot {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 700; flex-shrink: 0;
    cursor: default;
  }
  .dot-good { background: rgba(38,166,154,.25); color: #4db6ac;
              border: 1.5px solid rgba(38,166,154,.5); }
  .dot-warn { background: rgba(255,213,79,.15); color: #ffd54f;
              border: 1.5px solid rgba(255,213,79,.4); }
  .dot-bad  { background: rgba(239,83,80,.15);  color: #ef5350;
              border: 1.5px solid rgba(239,83,80,.4); }
  .score-summary {
    font-size: 0.82rem; color: var(--muted); line-height: 1.5;
  }
  .score-summary strong { color: var(--text); }
</style>
</head>

// ─────────────────────────────────────────────────────────────────
// judgeTiming(type, zz)  — 독립 모듈, 프로덕션 이식용
//   입력: type 'BUY'|'SELL',  zz zigzag 객체 (small 또는 large)
//   출력: { score }  score: 'good'|'warn'|'bad'
// ─────────────────────────────────────────────────────────────────
function judgeTiming(type, zz) {
  if (!zz) return { score: 'warn' };
  const ph = zz.phase, lb = zz.progress_label;
  if (type === 'BUY') {
    if (ph === 'rising'  && lb === 'early') return { score: 'good' };
    if (ph === 'rising'  && lb === 'mid')   return { score: 'warn' };
    if (ph === 'rising'  && lb === 'late')  return { score: 'bad'  };
    if (ph === 'falling' && lb === 'early') return { score: 'bad'  };
    if (ph === 'falling' && lb === 'mid')   return { score: 'warn' };
    if (ph === 'falling' && lb === 'late')  return { score: 'good' };
  } else {
    if (ph === 'rising'  && lb === 'early') return { score: 'bad'  };
    if (ph === 'rising'  && lb === 'mid')   return { score: 'warn' };
    if (ph === 'rising'  && lb === 'late')  return { score: 'good' };
    if (ph === 'falling' && lb === 'early') return { score: 'good' };
    if (ph === 'falling' && lb === 'mid')   return { score: 'warn' };
    if (ph === 'falling' && lb === 'late')  return { score: 'bad'  };
  }
  return { score: 'warn' };
}

// ── 종목 한 줄 내러티브 생성 ──────────────────────────────────────
// asset_profile → 사용자가 읽을 수 있는 한 문장
// ─────────────────────────────────────────────────────────────────
function assetNarrative(name, p) {
  if (!p) return '';

  // 변동성 묘사
  const volDesc = p.tags.includes('고변동')
    ? `단기 파동 하나에 평균 ${p.small_gain_pct.toFixed(0)}%씩 움직이는 <strong>고변동 종목</strong>`
    : p.tags.includes('중변동')
    ? `단기 파동 하나에 평균 ${p.small_gain_pct.toFixed(0)}%씩 움직이는 <strong>중변동 종목</strong>`
    : `비교적 안정적으로 움직이는 <strong>저변동 종목</strong>`;

  // 장기 사이클 묘사
  const cycleDesc = p.tags.includes('장기 흐름 불규칙')
    ? `큰 흐름의 타이밍을 잡기 어렵고`
    : `큰 흐름이 비교적 규칙적으로 반복되며`;

  // 장기 상승 폭 묘사
  const gainDesc = p.tags.includes('큰 흐름 폭발적')
    ? `한 번 오를 때 평균 <strong>+${p.large_gain_pct.toFixed(0)}%</strong>라는 폭발적인 상승을 보였습니다`
    : p.tags.includes('큰 흐름 강함')
    ? `한 번 오를 때 평균 <strong>+${p.large_gain_pct.toFixed(0)}%</strong>의 강한 상승을 보였습니다`
    : `한 번 오를 때 평균 <strong>+${p.large_gain_pct.toFixed(0)}%</strong> 수준으로 움직였습니다`;

  // 비대칭 묘사
  const asymDesc = p.asymmetry < 0.9
    ? ' 오를 때 빠르고 내릴 때 느린 편입니다.'
    : p.asymmetry > 1.1
    ? ' 내릴 때 빠르고 오를 때 느린 편입니다.'
    : '';

  return `<strong>${name}</strong>은 ${volDesc}입니다. 지난 5년간 ${cycleDesc}, ${gainDesc}.${asymDesc}`;
}

// ── 스코어 도트 렌더 ──────────────────────────────────────────────
function scoreDots(txList, type, scale) {
  // scale: 'small'|'large'  →  small_zigzag / large_zigzag
  const filtered = txList.filter(tx => tx.type === type);
  if (filtered.length === 0) return '<span style="color:var(--muted);font-size:.8rem">거래 없음</span>';
  return filtered.map((tx, i) => {
    const zz = scale === 'small' ? tx.small_zigzag : tx.large_zigzag;
    const { score } = judgeTiming(type, zz);
    const symbol = score === 'good' ? '✓' : score === 'bad' ? '✕' : '△';
    return `<div class="dot dot-${score}" title="${tx.date}">${symbol}</div>`;
  }).join('');
}

// ── 스코어 요약 문장 ──────────────────────────────────────────────
function scoreSummary(txList, type, profile) {
  const filtered = txList.filter(tx => tx.type === type);
  if (filtered.length === 0) return '';

  // 장기 zigzag 기준으로 판단 (더 의미 있음)
  const scores = filtered.map(tx => judgeTiming(type, tx.large_zigzag).score);
  const good = scores.filter(s => s === 'good').length;
  const bad  = scores.filter(s => s === 'bad').length;
  const n    = scores.length;

  if (type === 'BUY') {
    if (good === n)
      return `${n}번 모두 <strong>장기 파동 좋은 위치</strong>에서 진입했습니다.`;
    if (good > bad)
      return `${n}번 중 ${good}번은 좋은 타이밍, ${bad}번은 아쉬운 진입이었습니다.`;
    if (bad > good)
      return `진입 타이밍이 다소 아쉬웠습니다. ${bad}번의 매수가 불리한 구간에 집중됐습니다.`;
    return `${n}번의 매수 타이밍이 혼재되어 있습니다.`;
  } else {
    // 매도는 장기 파동 중 얼마나 먹고 팔았는지도 고려
    const avgReturn = txList
      .filter(tx => tx.type === 'SELL') // pair_summary가 없으므로 간단 메시지
      .length;
    if (good === n)
      return `${n}번 모두 <strong>고점 부근</strong>에서 잘 팔았습니다.`;
    if (good > bad)
      return `${n}번 중 ${good}번은 좋은 타이밍에 매도했습니다.`;
    if (bad > good) {
      const hint = profile ? ` (이 종목은 장기 파동에서 평균 +${profile.large_gain_pct.toFixed(0)}% 상승)` : '';
      return `매도가 다소 이른 경향이 있습니다. ${bad}번은 상승 여력이 남은 시점에 팔았습니다.${hint}`;
    }
    return `${n}번의 매도 타이밍이 혼재되어 있습니다.`;
  }
}

  tab.textContent = `${ticker.asset_name} (${ticker.ticker})`;
  tab.onclick = () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".ticker-panel").forEach(p => p.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById("panel-" + ti).classList.add("active");
  };
  tabs.appendChild(tab);

  // 패널
  const panel = document.createElement("div");
  panel.className = "ticker-panel" + (ti === 0 ? " active" : "");
  panel.id = "panel-" + ti;

  const p   = ticker.asset_profile;
  const txs = ticker.transactions;

  panel.innerHTML = `
    <div class="ticker-section">
      <div class="asset-narrative">${assetNarrative(ticker.asset_name, p)}</div>
      <div class="score-grid">
        <div class="score-block">
          <div class="score-label">매수 타이밍</div>
          <div class="score-dots">${scoreDots(txs, 'BUY', 'large')}</div>
          <div class="score-summary">${scoreSummary(txs, 'BUY', p)}</div>
        </div>
        <div class="score-block">
          <div class="score-label">매도 타이밍</div>
          <div class="score-dots">${scoreDots(txs, 'SELL', 'large')}</div>
          <div class="score-summary">${scoreSummary(txs, 'SELL', p)}</div>
        </div>
      </div>
    </div>`;

  panels.appendChild(panel);
});
</script>
</body>
</html>
